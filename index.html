<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Buddy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Travel Buddy Logo" class="logo">
        <div class="header-text">
        <h1>Travel Buddy</h1>
        <p>Supporting our Indian globe-trotters</p>
        </div>
    
        <button id="theme-toggle" onclick="toggleTheme()" style="margin-left: auto; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: none; font-weight: bold;">
            🌙 Dark Mode
        </button>
    </header>

    <div class="container">
        <button id="back-btn" class="btn-secondary" style="display: none;" onclick="goToPage('page-dashboard')">⬅ Back to Menu</button>

        <div id="page-login" class="view active">
            <form id="login-form" class="card" onsubmit="sendMagicLink(event)">
                <h3>Welcome!</h3>
                <p>Enter your email and we'll send you a secure login link.</p>
                
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" id="login-email" required placeholder="hello@example.com">
                </div>
                
                <button type="submit" id="login-btn" class="btn-primary">Send Secure Link</button>
            </form>
        </div>

        <div id="page-dashboard" class="view" style="display: none;">
            <div class="card">
                <h2>Welcome to Your Hub</h2>
                <p>What would you like to do today?</p>
    
                <div class="action-grid">
                    <button class="action-card" onclick="goToPage('page-entry')">
                        <div class="action-icon">✈️</div>
                        <h3>Enter Details</h3>
                        <p>Log your upcoming flight to offer or request assistance.</p>
                    </button>

                    <button class="action-card" onclick="goToPage('page-search')">
                        <div class="action-icon">🔍</div>
                        <h3>Search Travelers</h3>
                        <p>Find fellow Indian globe-trotters on your route.</p>
                    </button>
                </div>
            </div>
        </div>

        <div id="page-entry" class="view" style="display: none;">
            <h2>Enter Traveler Details</h2>
            <form id="entry-form" class="card" onsubmit="submitEntryForm(event)">
                
                <div class="form-row">
                    <div class="form-group half">
                        <label>First Name:</label>
                        <input type="text" id="entry-fname" required>
                    </div>
                    <div class="form-group half">
                        <label>Surname:</label>
                        <input type="text" id="entry-lname" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label>Origin (Code):</label>
                        <input type="text" id="entry-origin" required placeholder="e.g., BOM" maxlength="3">
                    </div>
                    <div class="form-group half">
                        <label>Destination (Code):</label>
                        <input type="text" id="entry-dest" required placeholder="e.g., LHR" maxlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label>Airlines:</label>
                    <input type="text" id="entry-airline" required>
                </div>

                <div class="form-row">
                    <div class="form-group third">
                        <label>Date:</label>
                        <input type="date" id="entry-date" required>
                    </div>
                    <div class="form-group third">
                        <label>Time:</label>
                        <input type="time" id="entry-time">
                    </div>
                    <div class="form-group third">
                        <label>Flight No:</label>
                        <input type="text" id="entry-flight">
                    </div>
                </div>

                <div class="form-group">
                    <label>Travel Intent:</label>
                    <select id="entry-intent" required>
                        <option value="" disabled selected>Select an option...</option>
                        <option value="Looking for a buddy">Looking for a buddy</option>
                        <option value="I can help">I can help</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Special Requests / Comments:</label>
                    <textarea id="entry-comments" rows="3" placeholder="e.g., Mother traveling alone, wheelchair assistance requested, traveling with infant..."></textarea>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                    <input type="checkbox" id="entry-flex-date" style="width: auto; cursor: pointer;">
                    <label for="entry-flex-date" style="margin: 0; cursor: pointer; font-weight: normal;">My dates are flexible (+/- 3 days)</label>
                </div>

                <div style="background-color: #f1f3f5; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em; color: #555;">
                    🔒 Exact flight numbers and contact details are hidden from public search.
                </div>

                <button type="submit" class="btn-primary">Save to Cloud...</button>
            </form>
        </div>

        <div id="page-search" class="view" style="display: none;">
            <h2>Find a Travel Buddy</h2>
            <form class="card search-box" onsubmit="performSearch(event)">
                <div class="form-row">
                    <div class="form-group third">
                        <label>From (Code):</label>
                        <input type="text" id="search-origin" required placeholder="e.g., BOM" maxlength="3">
                    </div>
                    <div class="form-group third">
                        <label>To (Code):</label>
                        <input type="text" id="search-dest" required placeholder="e.g., LHR" maxlength="3">
                    </div>
                    <div class="form-group third">
                        <label>Travel Date:</label>
                        <input type="date" id="search-date" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Search Database</button>
            </form>

            <div id="search-results">
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    
    <script src="js/script.js"></script>
</body>
</html>
